<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#181d10">
<meta name="description" content="全連人員管理系統">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233a4728' width='180' height='180'/><text x='50%' y='50%' font-size='80' fill='%23f0b535' text-anchor='middle' dominant-baseline='middle'>⚔</text></svg>">
<title>全連人員管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

:root {
  --bg: #181d10;
  --bg2: #1f2615;
  --bg3: #252e18;
  --olive: #3a4728;
  --olive2: #4a5a34;
  --khaki: #7a9050;
  --khaki2: #a8bf72;
  --amber: #c8902a;
  --amber2: #f0b535;
  --paper: #e5e0cc;
  --paper2: #c8c2a8;
  --ink: #12160c;
  --muted: #606858;
  --green: #3aad65;
  --green2: #5dde8e;
  --red: #b83528;
  --red2: #f07060;
  --blue: #2878b0;
  --blue2: #68c0f0;
  --yellow: #c09020;
  --yellow2: #f0c840;
  --border: rgba(120,144,80,0.25);
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(58,71,40,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(58,71,40,0.12) 0%, transparent 60%);
  font-family:'Noto Sans TC',sans-serif;
  color:var(--paper);
  min-height:100vh;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border-bottom: 2px solid var(--amber);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow);
  min-height: 64px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 24px 12px 0;
  border-right: 1px solid var(--border);
  margin-right: 24px;
}

.brand-icon {
  width: 44px;
  height: 44px;
  background: var(--olive);
  border: 2px solid var(--amber2);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.brand-text h1 {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--amber2);
  white-space: nowrap;
}

.brand-text p {
  font-family:'Share Tech Mono',monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
}

.header-stats {
  display: flex;
  align-items: center;
  gap: 4px;
}

.stat-chip {
  padding: 6px 14px;
  border-right: 1px solid var(--border);
  text-align: center;
}

.stat-chip .n {
  font-family:'Share Tech Mono',monospace;
  font-size: 20px;
  font-weight: bold;
  line-height: 1;
}

.stat-chip .l {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-top: 2px;
}

.stat-chip.c-all .n    { color: var(--amber2); }
.stat-chip.c-train .n  { color: var(--green2); }
.stat-chip.c-leave .n  { color: var(--red2); }

.header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hbtn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--paper2);
  font-family:'Noto Sans TC',sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}

.hbtn:hover { border-color: var(--amber); color: var(--amber2); }

.hbtn.primary {
  background: var(--amber);
  border-color: var(--amber);
  color: var(--ink);
  font-weight: 700;
}

.hbtn.primary:hover { background: var(--amber2); }

/* ── FILTER BAR ── */
.filterbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.fbtn {
  padding: 5px 14px;
  border: 1px solid var(--muted);
  background: transparent;
  color: var(--paper2);
  font-family:'Noto Sans TC',sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 1px;
}

.fbtn:hover { border-color: var(--khaki); color: var(--khaki2); }
.fbtn.active { background: var(--amber); border-color: var(--amber); color: var(--ink); font-weight: 700; }

.search-wrap {
  margin-left: auto;
  position: relative;
}

.search-wrap input {
  padding: 6px 12px 6px 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--paper);
  font-family:'Share Tech Mono',monospace;
  font-size: 12px;
  width: 200px;
  outline: none;
  transition: border-color .18s;
}

.search-wrap input:focus { border-color: var(--amber); }
.search-wrap input::placeholder { color: var(--muted); }

.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  pointer-events: none;
}

/* ── MAIN ── */
main { padding: 20px 24px 40px; }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-family:'Share Tech Mono',monospace;
  letter-spacing: 3px;
  font-size: 13px;
}

.empty-state .big { font-size: 48px; margin-bottom: 16px; }

/* ── PLATOON ── */
.platoon-wrap {
  margin-bottom: 28px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg,var(--bg2),var(--bg3));
  overflow: hidden;
}

.platoon-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--olive);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}

.platoon-bar:hover { background: var(--olive2); }

.platoon-chevron {
  font-size: 11px;
  color: var(--khaki);
  transition: transform .2s;
  flex-shrink: 0;
}

.platoon-wrap.collapsed .platoon-chevron { transform: rotate(-90deg); }

.platoon-tag {
  font-family:'Share Tech Mono',monospace;
  font-size: 11px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--khaki);
  color: var(--amber2);
  padding: 2px 10px;
  letter-spacing: 2px;
  flex-shrink: 0;
}

.platoon-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--khaki2);
  flex: 1;
}

.platoon-meta {
  font-family:'Share Tech Mono',monospace;
  font-size: 11px;
  color: var(--muted);
}

.platoon-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 26px;
  height: 26px;
  border: 1px solid var(--muted);
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}

.icon-btn:hover.edit { border-color: var(--amber); color: var(--amber2); }
.icon-btn:hover.del { border-color: var(--red); color: var(--red2); }
.icon-btn:hover.add { border-color: var(--green); color: var(--green2); }

.platoon-body {
  padding: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  transition: all .2s;
}

.platoon-wrap.collapsed .platoon-body { display: none; }

/* squad add btn inside grid */
.squad-add-tile {
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 20px;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all .15s;
  min-height: 100px;
}

.squad-add-tile:hover { border-color: var(--khaki); color: var(--khaki2); }

/* ── SQUAD ── */
.squad-card {
  border: 1px solid var(--border);
  background: var(--bg);
  overflow: hidden;
  transition: border-color .15s;
}

.squad-card:hover { border-color: var(--olive2); }

.squad-head {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

.squad-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--amber);
  flex: 1;
}

.squad-count {
  font-family:'Share Tech Mono',monospace;
  font-size: 11px;
  color: var(--muted);
}

.squad-actions { display: flex; gap: 4px; }

.m-until {
  font-family:'Share Tech Mono',monospace;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

/* ── MEMBER ROW ── */
.member-list { padding: 4px 0; }

.member-row {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background .12s;
  cursor: pointer;
}

.member-row:last-child { border-bottom: none; }
.member-row:hover { background: rgba(255,255,255,0.05); }

.m-rank {
  font-family:'Share Tech Mono',monospace;
  font-size: 11px;
  color: var(--khaki);
  min-width: 44px;
  flex-shrink: 0;
}

.m-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
}

.m-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 2px;
  flex-shrink: 0;
}

.b-train  { background:rgba(58,173,101,.18);  color:var(--green2);  border:1px solid rgba(58,173,101,.35); }
.b-leave  { background:rgba(184,53,40,.18);   color:var(--red2);    border:1px solid rgba(184,53,40,.35); }
.b-incamp { background:rgba(120,144,80,.18);  color:var(--khaki2);  border:1px solid rgba(120,144,80,.35);}
.b-recruit{ background:rgba(200,144,42,.18);  color:var(--amber2);  border:1px solid rgba(200,144,42,.35);}
.b-attach { background:rgba(100,80,160,.18);  color:#c0a8f0;        border:1px solid rgba(100,80,160,.35);}
.b-support{ background:rgba(40,140,160,.18);  color:#70d8f0;        border:1px solid rgba(40,140,160,.35);}

.stat-chip.c-incamp  .n { color: var(--khaki2); }
.stat-chip.c-recruit .n { color: var(--amber2); }
.stat-chip.c-attach  .n { color: #c0a8f0; }
.stat-chip.c-support .n { color: #70d8f0; }

.member-del-btn {
  width: 20px;
  height: 20px;
  border: none;
  background: transparent;
  color: transparent;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .15s;
  flex-shrink: 0;
  padding: 0;
  line-height: 1;
}

.member-row:hover .member-del-btn { color: var(--red2); }
.member-del-btn:hover { color: var(--red) !important; }

.add-member-row {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  gap: 8px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  border-top: 1px dashed rgba(255,255,255,0.06);
  transition: color .15s;
}

.add-member-row:hover { color: var(--green2); }

/* ── MODALS / DIALOGS ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.open { display: flex; animation: fadeIn .18s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.dialog {
  background: var(--bg2);
  border: 2px solid var(--amber);
  width: 100%;
  box-shadow: 0 0 60px rgba(200,144,42,.2);
  animation: slideUp .22s ease;
  position: relative;
}

@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:none;opacity:1} }

.dialog-head {
  background: var(--olive);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--amber);
}

.dialog-title {
  font-family:'Share Tech Mono',monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--amber2);
}

.dialog-close {
  background: none;
  border: 1px solid var(--muted);
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}

.dialog-close:hover { border-color: var(--red2); color: var(--red2); background: rgba(184,53,40,.1); }

.profile-footer {
  justify-content: space-between !important;
  align-items: center;
}

.profile-back {
  color: var(--khaki2) !important;
  border-color: var(--khaki) !important;
  font-size: 13px !important;
  letter-spacing: 1px !important;
}

.profile-back:hover {
  background: rgba(120,144,80,.15) !important;
  color: var(--amber2) !important;
}

/* dialog body scrollable on small screens */
.dialog-body {
  max-height: 70vh;
  overflow-y: auto;
  overscroll-behavior: contain;
}

.dialog-close:hover { color: var(--paper); }

.dialog-body { padding: 20px; }
.dialog-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ── FORM ELEMENTS ── */
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; }

.form-row input,
.form-row select,
.form-row textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--paper);
  font-family:'Noto Sans TC',sans-serif;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}

.form-row input:focus,
.form-row select:focus,
.form-row textarea:focus { border-color: var(--amber); }

.form-row textarea { min-height: 64px; resize: vertical; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.info-cell {
  background: rgba(0,0,0,0.2);
  padding: 8px 12px;
  border-left: 2px solid var(--olive2);
}

.info-cell .k { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 3px; }
.info-cell .v { font-family:'Share Tech Mono',monospace; font-size: 12px; color: var(--paper); }

/* person profile header */
.profile-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.profile-avatar {
  width: 64px;
  height: 64px;
  background: var(--olive);
  border: 2px solid var(--khaki);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.profile-name { font-size: 22px; font-weight: 900; letter-spacing: 4px; color: var(--amber2); }
.profile-rank { font-family:'Share Tech Mono',monospace; font-size: 12px; color: var(--khaki2); letter-spacing: 2px; margin-top: 2px; }

/* status bar in profile */
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.status-row label { font-size: 10px; letter-spacing: 2px; color: var(--muted); white-space: nowrap; }
.status-row select { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--paper); font-family:'Noto Sans TC',sans-serif; font-size: 13px; padding: 4px 8px; outline: none; }
.status-row select:focus { border-color: var(--amber); }

/* ── BUTTONS ── */
.btn { padding: 8px 18px; font-family:'Noto Sans TC',sans-serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; border: none; font-weight: 700; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--amber); color: var(--ink); }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--muted); color: var(--muted); font-weight: 400; }

/* ── CONFIRM DIALOG ── */
.confirm-msg { font-size: 14px; line-height: 1.7; color: var(--paper2); margin-bottom: 6px; }
.confirm-sub { font-size: 12px; color: var(--red2); letter-spacing: 1px; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--olive);
  border: 1px solid var(--amber);
  color: var(--amber2);
  font-family:'Share Tech Mono',monospace;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 11px 18px;
  z-index: 999;
  transform: translateY(60px);
  opacity: 0;
  transition: all .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  max-width: 260px;
}

.toast.show { transform: none; opacity: 1; }

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  .stat-chip { padding: 6px 8px; }
  .stat-chip:not(.c-all):not(.c-incamp):not(.c-train) { display: none; }
  .brand-text p { display: none; }
  .platoon-body { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="brand-icon">⚔</div>
    <div class="brand-text">
      <h1>全連人員管理</h1>
      <p>COMPANY PERSONNEL SYSTEM</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip c-all"><div class="n" id="s-all">0</div><div class="l">總人數</div></div>
    <div class="stat-chip c-incamp"><div class="n" id="s-incamp">0</div><div class="l">在部</div></div>
    <div class="stat-chip c-train"><div class="n" id="s-train">0</div><div class="l">受訓</div></div>
    <div class="stat-chip c-leave"><div class="n" id="s-leave">0</div><div class="l">放假</div></div>
    <div class="stat-chip c-recruit"><div class="n" id="s-recruit">0</div><div class="l">招募</div></div>
    <div class="stat-chip c-attach"><div class="n" id="s-attach">0</div><div class="l">合署</div></div>
    <div class="stat-chip c-support"><div class="n" id="s-support">0</div><div class="l">支援</div></div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="exportData()">📤 匯出</button>
    <button class="hbtn" onclick="triggerImport()">📥 匯入</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="hbtn primary" onclick="openAddPlatoon()">＋ 新增排</button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filterbar">
  <button class="fbtn active" onclick="setFilter('all',this)">全部</button>
  <button class="fbtn" onclick="setFilter('在部',this)">在部</button>
  <button class="fbtn" onclick="setFilter('受訓中',this)">受訓中</button>
  <button class="fbtn" onclick="setFilter('放假',this)">放假</button>
  <button class="fbtn" onclick="setFilter('招募',this)">招募</button>
  <button class="fbtn" onclick="setFilter('合署',this)">合署</button>
  <button class="fbtn" onclick="setFilter('支援',this)">支援</button>
  <div class="search-wrap">
    <input type="text" placeholder="姓名 / 軍號..." oninput="doSearch(this.value)">
  </div>
</div>

<!-- MAIN -->
<main id="app"></main>

<!-- ══════════════ DIALOGS ══════════════ -->

<!-- Platoon name dialog -->
<div class="overlay" id="dl-platoon">
  <div class="dialog" style="max-width:380px">
    <div class="dialog-head">
      <span class="dialog-title" id="dl-platoon-title">新增排</span>
      <button class="dialog-close" onclick="closeAll()">✕</button>
    </div>
    <div class="dialog-body">
      <div class="form-row">
        <label>排別名稱</label>
        <input id="dp-name" type="text" placeholder="例：第一排">
      </div>
    </div>

<script>
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  // 只在 HTTPS 或 localhost 時註冊
  navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
    console.log('✔ Service Worker 已註冊');
    // 每小時檢查更新
    setInterval(() => reg.update(), 3600000);
  }).catch(err => {
    console.warn('⚠ Service Worker 註冊失敗（本機開發環境或HTTP）:', err.message);
    console.log('提示：如需 PWA 功能，請上傳到支援 HTTPS 的伺服器');
  });
} else if (location.protocol !== 'https:') {
  console.log('ℹ Service Worker 需要 HTTPS 或 localhost 才能運作（本機測試時可忽略）');
}

// 監聽 Service Worker 更新
if (navigator.serviceWorker) {
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    toast('✔ 系統已更新（資料已保留）');
    setTimeout(() => window.location.reload(), 1500);
  });
}
</script>

<script>
// 確保頁面載入後初始化
window.addEventListener('DOMContentLoaded', function() {
  console.log('🔄 頁面已載入，開始初始化...');
  
  // 初始化資料
  if (typeof db === 'undefined') {
    db = {};
  }
  
  if (!db.platoons || db.platoons.length === 0) {
    db = defaultData();
    console.log('✔ 已使用預設資料');
  }
  
  // 嘗試載入本機資料
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      db = JSON.parse(saved);
      console.log('✔ 已載入本機資料');
    }
  } catch(e) {
    console.warn('本機資料載入失敗:', e);
  }
  
  // 渲染頁面
  if (typeof render === 'function') {
    render();
    console.log('✔ 頁面已渲染，共 ' + (db.platoons ? db.platoons.length : 0) + ' 個排');
  } else {
    console.error('❌ render 函數未定義');
  }
});
</script>
